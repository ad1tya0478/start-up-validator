CEO_task:
  description: >
    Analyze the startup idea: {topic} as a practical startup CEO.

    Your responsibility:
    - define the business model
    - identify the core problem being solved
    - identify target customers
    - explain monetization
    - evaluate scalability
    - define competitive positioning

    Use the shared memory from previous discussions if available.

    IMPORTANT:
    - Focus only on business strategy.
    - Do not discuss deep marketing or technical details.
    - Keep the analysis realistic and execution-focused.
    - Avoid startup buzzwords and hype.
    - Directly challenge weak assumptions if found in memory.
    - Keep output between 500 words only. 
    - Return structured markdown only.

  expected_output: >
    Generate markdown with heading "## CEO Analysis".

    Structure:
    - Startup Overview
    - Problem Statement
    - Business Model
    - Revenue Strategy
    - Scalability Potential
    - Competitive Positioning
    - Operational Challenges
    - Final CEO Opinion

    Use short analytical paragraphs with minimal bullet points.
  agent: CEO 



marketer_task:
  description: >
    Analyze the startup idea: {topic} as a senior startup marketer.

    Use:
    - shared memory
    - previous agent outputs
    - internet research

    Your role:
    - validate market demand
    - analyze customer psychology
    - identify competitors
    - evaluate branding opportunities
    - identify realistic customer acquisition channels
    - identify market risks

    Critically challenge:
    - unrealistic growth assumptions
    - weak monetization claims
    - poor customer targeting

    IMPORTANT:
    - Use the search tool ONLY for:
      - market trends
      - competitor validation
      - industry growth signals
    - Do not overuse search.
    - Do not repeat CEO analysis.
    - Reference previous agent claims when criticizing them.
    - Keep output between 500 words only.
    - Return clean markdown only.

  expected_output: >
    Generate markdown with heading "## Marketing Analysis".

    Structure:
    - Market Demand
    - Customer Pain Points
    - Target Audience
    - Competitor Landscape
    - Branding Potential
    - Customer Acquisition Strategy
    - Market Risks
    - Final Marketing Opinion

    Use concise analytical paragraphs with occasional bullet points.
  agent: marketer

marketer_critique_task:
  description: >
    Critically evaluate the startup idea and identify weaknesses
    in the business and market strategy.

    ```
    Analyze:
    - market demand
    - customer pain points
    - competition
    - monetization
    - customer acquisition difficulty
    - scalability of the business model
    - unrealistic assumptions

    Use the CEO vision, marketing analysis, and developer analysis
    as context before forming criticism.

    Be skeptical, realistic, and direct.
    Avoid repeating previous outputs unnecessarily.
    ```
  expected_output: >
    A concise but detailed criticism report covering:
    - market risks
    - growth limitations
    - monetization concerns
    - customer acquisition challenges
    - competitive threats
    - unrealistic business assumptions
    Keep the response structured and under 500 words.
  agent: marketer


developer_task:
  description: >
    Analyze the startup idea: {topic} as a senior software architect.

    Use:
    - shared memory
    - outputs from CEO and Marketer agents

    Your role:
    - evaluate technical feasibility
    - identify scalability concerns
    - estimate infrastructure complexity
    - identify security risks
    - evaluate development cost and maintainability
    - criticize unrealistic technical assumptions

    IMPORTANT:
    - Do NOT use the search tool unless absolutely necessary.
    - Prefer reasoning from engineering experience.
    - Challenge fake AI claims or technically unrealistic promises.
    - Reference previous agent claims directly when needed.
    - Avoid excessive jargon.
    - Keep output between 500 - 550 words.
    - Return structured markdown only.

  expected_output: >
    Generate markdown with heading "## Developer Analysis".

    Structure:
    - Technical Feasibility
    - Recommended Tech Stack
    - Infrastructure Requirements
    - Scalability Challenges
    - Security Concerns
    - Development Complexity
    - Long-Term Maintenance
    - Technical Risks
    - Final Technical Verdict

    Use analytical paragraphs with limited bullet points.
  agent: developer


developer_critique_task:
  description: >
    Critically evaluate the technical feasibility of the startup.

    ```
    Analyze:
    - scalability problems
    - engineering complexity
    - infrastructure cost
    - AI limitations
    - security risks
    - data availability issues
    - maintenance difficulty
    - unrealistic technical assumptions

    Use the CEO vision, marketing analysis, and developer analysis
    as context before forming criticism.

    Be practical, skeptical, and technically realistic.
    Avoid unnecessary repetition.
    ```

  expected_output: >
    A structured technical criticism report covering:
    - scalability concerns
    - infrastructure and operational costs
    - engineering risks
    - AI and data limitations
    - security concerns
    - technical bottlenecks
    - unrealistic implementation assumptions
    Keep the response under 500 words.
  agent: developer



CEO_defense_task:
  description: >
    Defend the startup idea against the criticisms raised by
    the marketer and developer agents.

    ```
    Address:
    - market concerns
    - competition concerns
    - monetization concerns
    - scalability concerns
    - technical feasibility concerns
    - execution risks

    Justify why the startup can still succeed despite the risks.

    Provide practical counterarguments, possible pivots,
    mitigation strategies, and long-term vision.

    Stay concise and avoid repeating the entire startup analysis.
    ```

  expected_output: >
    A structured defense report that:
    - responds to major criticisms
    - explains mitigation strategies
    - clarifies long-term vision
    - defends business viability
    - addresses technical concerns realistically
    Keep the response under 500 words.
  agent: CEO



vc_task:
  description: >
    Analyze the complete startup discussion for the idea: {topic}.

    ```
    You are a skeptical venture capitalist making a realistic
    investment decision after reviewing a multi-agent debate.

    Use:
    - outputs from all previous agents
    - critique rounds
    - CEO defense responses
    - internet research with search tool 

    Your role:
    - evaluate profitability
    - analyze market timing
    - evaluate scalability
    - evaluate execution complexity
    - identify operational risks
    - identify weak assumptions
    - analyze long-term sustainability
    - evaluate founder feasibility

    Carefully review:
    - CEO vision
    - marketing analysis
    - developer analysis
    - marketer critiques
    - developer critiques
    - CEO defense responses

    IMPORTANT:
    - Do not repeat entire agent outputs.
    - Summarize each agent briefly and focus on insights.
    - Highlight major disagreements between agents.
    - Evaluate whether the CEO defense successfully addresses criticisms.
    - Provide your own investor opinion on the debate.
    - Use the search tool ONLY for:
      - market validation
      - funding trends
      - industry outlook
    - Keep output between 900-1200 words.
    - Maintain professional investor tone.
    - Return markdown only.

    End with a direct investment decision:
    GO or NO-GO.
    ```

  expected_output: >
    Generate markdown with heading:

    ```
    ## Final Startup Validation Report

    Structure:

    ## Executive Summary
    Summarize the startup idea and overall evaluation.

    ## CEO Analysis Summary
    Summarize:
    - business strategy
    - monetization
    - scalability vision
    - operational viability

    ## Marketing Analysis Summary
    Summarize:
    - market demand
    - competitors
    - customer acquisition
    - branding opportunities
    - market risks

    ## Developer Analysis Summary
    Summarize:
    - technical feasibility
    - scalability
    - infrastructure complexity
    - engineering risks

    ## Critique Round Summary
    Summarize the major criticisms raised by:
    - marketer
    - developer

    Include:
    - weak assumptions
    - scalability concerns
    - market concerns
    - technical concerns
    - operational concerns

    ## CEO Defense Evaluation
    Summarize how the CEO responded to criticisms.

    Evaluate:
    - whether the defense was convincing
    - whether mitigation strategies were realistic
    - whether major concerns remain unresolved

    ## Key Contradictions
    Identify disagreements or conflicting assumptions
    between agents.

    ## Risk Assessment
    Analyze:
    - financial risk
    - operational risk
    - technical risk
    - market risk
    - execution risk

    ## VC Verdict
    Evaluate:
    -profitability potential
    -execution difficulty
    -market timing
    -scalability
    -sustainability
    -founder feasibility

    Include your own investor opinion on:
    - the critique quality
    - the CEO defense quality
    - the overall viability of the startup

    End with:

    ## Final Decision

    Clearly state:
    GO or NO-GO
  agent: vc
